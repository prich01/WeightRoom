<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bearden Baseball Hub</title>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --accent: #ff4757; --text: #ffffff; --muted: #a0a0a0; --success: #2ed573; --gold: #ffa500; }
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); padding: 15px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 420px; }
        header { text-align: center; margin-bottom: 20px; }
        header h1 { margin: 0; font-size: 1.6rem; text-transform: uppercase; letter-spacing: 1px; color: #fff; }
        
        .selector-group { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 12px; border: 1px solid #2d2d2d; display: flex; gap: 10px; }
        
        .tab-navigation { display: flex; gap: 8px; margin-bottom: 15px; }
        .nav-tab { flex: 1; text-align: center; background: #252525; border: 1px solid #383838; padding: 10px 5px; border-radius: 8px; font-size: 0.82rem; font-weight: bold; text-transform: uppercase; cursor: pointer; color: var(--muted); transition: all 0.2s; }
        .nav-tab.active-tab { background: var(--accent); color: white; border-color: var(--accent); }
        
        .input-group { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #2d2d2d; }
        .block-header { font-size: 0.85rem; font-weight: bold; text-transform: uppercase; color: var(--accent); margin-bottom: 12px; letter-spacing: 0.5px; border-bottom: 1px solid #333; padding-bottom: 6px; }
        .exercise-container { margin-bottom: 15px; padding-bottom: 10px; }
        .exercise-container:last-of-type { margin-bottom: 0; padding-bottom: 0; }
        .exercise-title { font-size: 1.15rem; font-weight: bold; margin-bottom: 2px; }
        
        .history-tag { font-size: 0.82rem; color: var(--muted); margin-bottom: 8px; display: flex; justify-content: space-between; background: #252525; padding: 6px 10px; border-radius: 6px; }
        .view-hist-btn { color: var(--accent); text-decoration: underline; cursor: pointer; font-weight: bold; }
        .prescription-tag { font-size: 0.85rem; color: var(--success); margin-bottom: 10px; font-weight: 600; text-transform: uppercase; }
        
        .row { display: flex; gap: 10px; margin-bottom: 10px; }
        .field { flex: 1; display: flex; flex-direction: column; }
        .field label { font-size: 0.75rem; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; }
        select, input { background: #2d2d2d; border: 1px solid #444; color: white; padding: 12px; border-radius: 8px; font-size: 1rem; width: 100%; box-sizing: border-box; color-scheme: dark; }
        
        button.action-btn { width: 100%; background: #333; color: white; border: 1px solid #444; padding: 12px; border-radius: 8px; font-size: 0.95rem; font-weight: bold; cursor: pointer; margin-top: 2px; }
        button.action-btn:active { background: var(--accent); border-color: var(--accent); }
        
        /* PR Ledger Styling Tables */
        .pr-card { background: #161616; border: 1px dashed #444; border-radius: 10px; padding: 12px; margin-top: 15px; }
        .pr-title { font-size: 0.85rem; font-weight: bold; color: var(--gold); text-transform: uppercase; margin-bottom: 8px; letter-spacing: 0.5px; display: flex; align-items: center; gap: 5px; }
        .pr-row { display: flex; justify-content: space-between; font-size: 0.9rem; padding: 6px 0; border-bottom: 1px dashed #2d2d2d; }
        .pr-row:last-of-type { border-bottom: none; }
        .pr-row span { color: var(--muted); font-size: 0.8rem; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .modal-content { background: var(--card); border: 1px solid #444; border-radius: 16px; padding: 20px; width: 100%; max-width: 380px; box-sizing: border-box; max-height: 80vh; overflow-y: auto; }
        .modal-header { font-size: 1.2rem; font-weight: bold; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 8px; color: var(--accent); text-transform: uppercase; }
        .history-item-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #2d2d2d; font-size: 0.95rem; }
        
        #status { text-align: center; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--success); color: white; padding: 10px 20px; border-radius: 20px; font-weight: bold; display: none; box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 100; }
        .hidden { display: none !important; }
        .no-workout { text-align: center; background: var(--card); padding: 30px; border-radius: 12px; color: var(--muted); }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <h1>⚡ Bearden Baseball</h1>
        </header>

        <div class="selector-group">
            <div class="field" style="flex: 1.5;">
                <label for="global-player">Active Athlete</label>
                <select id="global-player">
                    <option value="">Loading Roster...</option>
                </select>
            </div>
            <div class="field" id="date-wrapper" style="flex: 1;">
                <label for="date-picker">Training Date</label>
                <input type="date" id="date-picker">
            </div>
        </div>

        <div class="tab-navigation">
            <div class="nav-tab active-tab" id="tab-lift" onclick="switchViewMode('lift')">Workout</div>
            <div class="nav-tab" id="tab-test" onclick="switchViewMode('test')">Testing</div>
            <div class="nav-tab" id="tab-max" onclick="switchViewMode('max')">Max Lifts</div>
        </div>

        <div id="view-workout-container">
            <div id="workout-content">
                <div id="block-warmup" class="input-group hidden">
                    <div class="block-header">Warmup Circuit</div>
                    <div class="exercise-title" id="txt-warmup">---</div>
                </div>

                <div id="dynamic-blocks-container"></div>

                <div id="block-core" class="input-group hidden">
                    <div class="block-header">Core Finisher</div>
                    <div class="exercise-container">
                        <div class="exercise-title" id="txt-core">---</div>
                        <div class="prescription-tag" id="rx-core">---</div>
                        <div class="row">
                            <div class="field">
                                <label id="lbl-core-type">Input</label>
                                <input type="number" id="val-core" inputmode="numeric" placeholder="---">
                            </div>
                        </div>
                        <button class="action-btn" id="btn-core" onclick="logCoreSet()">Log Core Finisher</button>
                    </div>
                </div>
            </div>
            <div id="no-workout-msg" class="no-workout hidden">
                No workouts scheduled for this date. 🏋️‍♂️⚾
            </div>
        </div>

        <div id="view-testing-container" class="hidden">
            <div class="input-group">
                <div class="block-header">Athletic Performance Metrics</div>
                
                <div class="row">
                    <div class="field"><label>Body Weight (lbs)</label><input type="number" step="0.1" id="t-weight" inputmode="decimal" placeholder="0.0"></div>
                    <div class="field"><label>60 Yd Dash (sec)</label><input type="number" step="0.01" id="t-sixty" inputmode="decimal" placeholder="0.00"></div>
                </div>
                <div class="row">
                    <div class="field"><label>Broad Jump (in)</label><input type="number" id="t-broad" inputmode="numeric" placeholder="0"></div>
                    <div class="field"><label>Exit Velo (mph)</label><input type="number" id="t-exit" inputmode="numeric" placeholder="0"></div>
                </div>
                <div class="row" style="margin-bottom: 15px;">
                    <div class="field"><label>Throwing Velo (mph)</label><input type="number" id="t-throw" inputmode="numeric" placeholder="0"></div>
                </div>
                
                <button class="action-btn" id="btn-submit-testing" style="background: var(--success); border-color: var(--success);" onclick="submitTestingForm()">Submit Testing Data</button>
                
                <div class="pr-card">
                    <div class="pr-title">🏆 Personal Best Testing Records</div>
                    <div id="testing-prs-output"></div>
                </div>
            </div>
        </div>

        <div id="view-maxes-container" class="hidden">
            <div class="input-group">
                <div class="block-header">Absolute Strength Max Records</div>
                
                <div class="row">
                    <div class="field"><label>Bench Press (lbs)</label><input type="number" id="m-bench" inputmode="numeric" placeholder="0"></div>
                    <div class="field"><label>Hex Deadlift (lbs)</label><input type="number" id="m-hex" inputmode="numeric" placeholder="0"></div>
                </div>
                <div class="row">
                    <div class="field"><label>Back Squat (lbs)</label><input type="number" id="m-squat" inputmode="numeric" placeholder="0"></div>
                    <div class="field"><label>Front Squat (lbs)</label><input type="number" id="m-front" inputmode="numeric" placeholder="0"></div>
                </div>
                <div class="row" style="margin-bottom: 15px;">
                    <div class="field"><label>Hang Clean (lbs)</label><input type="number" id="m-clean" inputmode="numeric" placeholder="0"></div>
                </div>
                
                <button class="action-btn" id="btn-submit-maxes" style="background: var(--success); border-color: var(--success);" onclick="submitMaxesForm()">Update Absolute Maxes</button>
                
                <div class="pr-card">
                    <div class="pr-title">🥇 All-Time Weight Room Maxes</div>
                    <div id="maxes-prs-output"></div>
                </div>
            </div>
        </div>

    </div>

    <div id="history-modal" class="modal" onclick="closeHistoryModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header" id="modal-title">Exercise History</div>
            <div id="modal-rows-container"></div>
            <button class="action-btn" style="margin-top: 15px; background: var(--accent);" onclick="closeHistoryModal()">Close History</button>
        </div>
    </div>

    <div id="status">💪 Saved Successfully!</div>

    <script>
        const googleAppUrl = "https://script.google.com/macros/s/AKfycbx4tsVG7IoC16WpgakICXNzDqJ6-P5zn504-6kwsN2kWX_lH3DYNmZjchPiiMVonz8/exec";

        let scheduleDatabase = [];
        let rosterDatabase = [];
        let historicalLogs = [];
        let testingLogs = [];
        let maxesLogs = [];
        let activeWorkout = null;

        function initListeners() {
            const picker = document.getElementById('date-picker');
            picker.value = new Date().toISOString().split('T')[0];
            picker.addEventListener('change', (e) => loadWorkoutForDate(e.target.value));
            
            document.getElementById('global-player').addEventListener('change', (e) => {
                localStorage.setItem('rememberedBaseballPlayer', e.target.value);
                calculatePlayerPersonalRecords();
                loadWorkoutForDate(document.getElementById('date-picker').value); 
            });
        }

        function switchViewMode(mode) {
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active-tab'));
            document.getElementById('view-workout-container').classList.add('hidden');
            document.getElementById('view-testing-container').classList.add('hidden');
            document.getElementById('view-maxes-container').classList.add('hidden');
            document.getElementById('date-wrapper').classList.remove('hidden');

            document.getElementById(`tab-${mode}`).classList.add('active-tab');
            
            if(mode === 'lift') {
                document.getElementById('view-workout-container').classList.remove('hidden');
            } else if(mode === 'test') {
                document.getElementById('view-testing-container').classList.remove('hidden');
                document.getElementById('date-wrapper').classList.add('hidden');
            } else if(mode === 'max') {
                document.getElementById('view-maxes-container').classList.remove('hidden');
                document.getElementById('date-wrapper').classList.add('hidden');
            }
        }

        function fetchDatabaseResources() {
            fetch(googleAppUrl)
                .then(res => res.json())
                .then(data => {
                    scheduleDatabase = data.workouts || [];
                    rosterDatabase = data.roster || [];
                    historicalLogs = data.logs || [];
                    testingLogs = data.testingLogs || [];
                    maxesLogs = data.maxesLogs || [];
                    
                    buildRosterDropdown();
                    calculatePlayerPersonalRecords();
                    loadWorkoutForDate(document.getElementById('date-picker').value);
                })
                .catch(err => console.error("Database extraction fault:", err));
        }

        function buildRosterDropdown() {
            const dropdown = document.getElementById('global-player');
            dropdown.innerHTML = ''; 
            if(rosterDatabase.length === 0) rosterDatabase = ["Guest Athlete"];
            rosterDatabase.forEach(p => {
                let opt = document.createElement('option'); opt.value = p; opt.innerText = p; dropdown.appendChild(opt);
            });
            const savedPlayer = localStorage.getItem('rememberedBaseballPlayer');
            if (savedPlayer && rosterDatabase.includes(savedPlayer)) {
                dropdown.value = savedPlayer;
            }
        }

        function calculatePlayerPersonalRecords() {
            const activePlayer = document.getElementById('global-player').value;
            
            // 1. Process Testing Sub-ledger (60 dash is lowest score wins, others are highest)
            const pTests = testingLogs.filter(l => l.player === activePlayer);
            let prTest = { bodyWeight: "---", sixtyDash: "---", broadJump: "---", exitVelo: "---", throwingVelo: "---" };
            
            pTests.forEach(row => {
                if(row.bodyWeight && (prTest.bodyWeight === "---" || row.bodyWeight > 0)) prTest.bodyWeight = `${row.bodyWeight} lbs <span>(${row.date})</span>`;
                if(row.sixtyDash && (prTest.sixtyDash === "---" || parseFloat(row.sixtyDash) < parseFloat(prTest.sixtyDash))) prTest.sixtyDash = `${row.sixtyDash} sec <span>(${row.date})</span>`;
                if(row.broadJump && (prTest.broadJump === "---" || parseInt(row.broadJump) > parseInt(prTest.broadJump))) prTest.broadJump = `${row.broadJump} in <span>(${row.date})</span>`;
                if(row.exitVelo && (prTest.exitVelo === "---" || parseInt(row.exitVelo) > parseInt(prTest.exitVelo))) prTest.exitVelo = `${row.exitVelo} mph <span>(${row.date})</span>`;
                if(row.throwingVelo && (prTest.throwingVelo === "---" || parseInt(row.throwingVelo) > parseInt(prTest.throwingVelo))) prTest.throwingVelo = `${row.throwingVelo} mph <span>(${row.date})</span>`;
            });
            
            document.getElementById('testing-prs-output').innerHTML = `
                <div class="pr-row"><strong>Body Weight:</strong> ${prTest.bodyWeight}</div>
                <div class="pr-row"><strong>⚡ 60-Yd Dash:</strong> ${prTest.sixtyDash}</div>
                <div class="pr-row"><strong>🚀 Broad Jump:</strong> ${prTest.broadJump}</div>
                <div class="pr-row"><strong>🔥 Exit Velo:</strong> ${prTest.exitVelo}</div>
                <div class="pr-row"><strong>⚾ Throwing Velo:</strong> ${prTest.throwingVelo}</div>
            `;

            // 2. Process Weight Room Maxes Sub-ledger (Highest number wins)
            const pMaxes = maxesLogs.filter(l => l.player === activePlayer);
            let prMax = { benchPress: "---", hexDL: "---", squat: "---", frontSquat: "---", hangClean: "---" };
            
            pMaxes.forEach(row => {
                if(row.benchPress && (prMax.benchPress === "---" || parseInt(row.benchPress) > parseInt(prMax.benchPress))) prMax.benchPress = `${row.benchPress} lbs <span>(${row.date})</span>`;
                if(row.hexDL && (prMax.hexDL === "---" || parseInt(row.hexDL) > parseInt(prMax.hexDL))) prMax.hexDL = `${row.hexDL} lbs <span>(${row.date})</span>`;
                if(row.squat && (prMax.squat === "---" || parseInt(row.squat) > parseInt(prMax.squat))) prMax.squat = `${row.squat} lbs <span>(${row.date})</span>`;
                if(row.frontSquat && (prMax.frontSquat === "---" || parseInt(row.frontSquat) > parseInt(prMax.frontSquat))) prMax.frontSquat = `${row.frontSquat} lbs <span>(${row.date})</span>`;
                if(row.hangClean && (prMax.hangClean === "---" || parseInt(row.hangClean) > parseInt(prMax.hangClean))) prMax.hangClean = `${row.hangClean} lbs <span>(${row.date})</span>`;
            });

            document.getElementById('maxes-prs-output').innerHTML = `
                <div class="pr-row"><strong>Bench Press:</strong> ${prMax.benchPress}</div>
                <div class="pr-row"><strong>Hex Deadlift:</strong> ${prMax.hexDL}</div>
                <div class="pr-row"><strong>Back Squat:</strong> ${prMax.squat}</div>
                <div class="pr-row"><strong>Front Squat:</strong> ${prMax.frontSquat}</div>
                <div class="pr-row"><strong>Hang Clean:</strong> ${prMax.hangClean}</div>
            `;
        }

        function getExerciseLastTimeText(exerciseName) {
            const player = document.getElementById('global-player').value;
            const matches = historicalLogs.filter(l => l.player === player && l.exercise === exerciseName);
            if(matches.length === 0) return "No history recorded yet";
            const lastSet = matches[matches.length - 1];
            return `Last: ${lastSet.weight} lbs x ${lastSet.reps} Reps`;
        }

        function openHistoryModal(exerciseName) {
            const player = document.getElementById('global-player').value;
            document.getElementById('modal-title').innerText = exerciseName;
            const container = document.getElementById('modal-rows-container');
            container.innerHTML = '';
            
            const matches = historicalLogs.filter(l => l.player === player && l.exercise === exerciseName).reverse();
            if(matches.length === 0) {
                container.innerHTML = `<div style="color:var(--muted); text-align:center; padding:20px;">No past data for ${player}</div>`;
            } else {
                matches.forEach(item => {
                    let div = document.createElement('div'); div.className = 'history-item-row';
                    div.innerHTML = `<span>📅 Date: ${item.date}</span> <strong>🏋️ ${item.weight} lbs x ${item.reps}</strong>`;
                    container.appendChild(div);
                });
            }
            document.getElementById('history-modal').style.display = 'flex';
        }

        function closeHistoryModal() { document.getElementById('history-modal').style.display = 'none'; }

        function loadWorkoutForDate(dateString) {
            activeWorkout = scheduleDatabase.find(w => w.Date === dateString);
            const content = document.getElementById('workout-content');
            const noMsg = document.getElementById('no-workout-msg');
            const container = document.getElementById('dynamic-blocks-container');
            container.innerHTML = ''; 
            
            if (!activeWorkout) {
                content.classList.add('hidden'); noMsg.classList.remove('hidden'); return;
            }
            content.classList.remove('hidden'); noMsg.classList.add('hidden');

            if (activeWorkout.Warmup) {
                document.getElementById('block-warmup').classList.remove('hidden');
                document.getElementById('txt-warmup').innerText = activeWorkout.Warmup;
            } else { document.getElementById('block-warmup').classList.add('hidden'); }

            ['A', 'B', 'C', 'D'].forEach(letter => {
                if (activeWorkout[`${letter}1_Exercise`]) {
                    const ex1 = activeWorkout[`${letter}1_Exercise`]; const ex2 = activeWorkout[`${letter}2_Exercise`];
                    const blockHTML = `
                        <div class="input-group">
                            <div class="block-header">Block ${letter} (Superset)</div>
                            <div class="exercise-container">
                                <div class="exercise-title">${letter}1: ${ex1}</div>
                                <div class="history-tag"><span>${getExerciseLastTimeText(ex1)}</span><span class="view-hist-btn" onclick="openHistoryModal('${ex1.replace(/'/g, "\\'")}')">[History]</span></div>
                                <div class="prescription-tag">Target: ${activeWorkout[`${letter}1_Prescription`] || 'As Prescribed'}</div>
                                <div class="row">
                                    <div class="field"><label>${activeWorkout[`${letter}1_Type`] || 'Weight'}</label><input type="number" id="val-${letter}1" inputmode="numeric" placeholder="---"></div>
                                    <div class="field"><label>Reps Done</label><input type="number" id="reps-${letter}1" inputmode="numeric" placeholder="---"></div>
                                </div>
                                <button class="action-btn" id="btn-${letter}1" onclick="logSupersetItem('${letter}', 1)">Log Set ${letter}1</button>
                            </div>
                            <div class="exercise-container" style="margin-top:15px; border-top:1px solid #333; padding-top:15px;">
                                <div class="exercise-title">${letter}2: ${ex2}</div>
                                <div class="history-tag"><span>${getExerciseLastTimeText(ex2)}</span><span class="view-hist-btn" onclick="openHistoryModal('${ex2.replace(/'/g, "\\'")}')">[History]</span></div>
                                <div class="prescription-tag">Target: ${activeWorkout[`${letter}2_Prescription`] || 'As Prescribed'}</div>
                                <div class="row">
                                    <div class="field"><label>${activeWorkout[`${letter}2_Type`] || 'Weight'}</label><input type="number" id="val-${letter}2" inputmode="numeric" placeholder="---"></div>
                                    <div class="field"><label>Reps Done</label><input type="number" id="reps-${letter}2" inputmode="numeric" placeholder="---"></div>
                                </div>
                                <button class="action-btn" id="btn-${letter}2" onclick="logSupersetItem('${letter}', 2)">Log Set ${letter}2</button>
                            </div>
                        </div>
                    `;
                    container.insertAdjacentHTML('beforeend', blockHTML);
                }
            });

            if (activeWorkout.Core_Exercise) {
                document.getElementById('block-core').classList.remove('hidden');
                document.getElementById('txt-core').innerText = activeWorkout.Core_Exercise;
                document.getElementById('rx-core').innerText = `Target: ${activeWorkout.Core_Prescription || 'As Prescribed'}`;
                document.getElementById('lbl-core-type').innerText = activeWorkout.Core_Type || 'Reps';
                document.getElementById('val-core').value = '';
            } else { document.getElementById('block-core').classList.add('hidden'); }
        }

        function logSupersetItem(letter, subIndex) {
            const btn = document.getElementById(`btn-${letter}${subIndex}`);
            const valInput = document.getElementById(`val-${letter}${subIndex}`);
            const repsInput = document.getElementById(`reps-${letter}${subIndex}`);
            btn.innerText = "Saving...";

            const payload = {
                type: "workout", playerName: document.getElementById('global-player').value,
                block: `Block ${letter}`, exercise: activeWorkout[`${letter}${subIndex}_Exercise`],
                weight: valInput.value || 0, reps: repsInput.value || 0
            };

            fetch(googleAppUrl, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify(payload) })
            .then(() => {
                showToast();
                historicalLogs.push({ date: "Today", player: payload.playerName, exercise: payload.exercise, weight: payload.weight, reps: payload.reps });
                valInput.value = ''; repsInput.value = '';
                loadWorkoutForDate(document.getElementById('date-picker').value); 
            }).catch(err => alert(err)).finally(() => btn.innerText = `Log Set ${letter}${subIndex}`);
        }

        function submitTestingForm() {
            const btn = document.getElementById('btn-submit-testing');
            btn.innerText = "Transmitting...";
            
            const payload = {
                type: "testing", playerName: document.getElementById('global-player').value,
                bodyWeight: document.getElementById('t-weight').value || 0,
                sixtyDash: document.getElementById('t-sixty').value || 0,
                broadJump: document.getElementById('t-broad').value || 0,
                exitVelo: document.getElementById('t-exit').value || 0,
                throwingVelo: document.getElementById('t-throw').value || 0
            };

            fetch(googleAppUrl, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify(payload) })
            .then(() => {
                showToast();
                testingLogs.push({ date: "Today", player: payload.playerName, bodyWeight: payload.bodyWeight, sixtyDash: payload.sixtyDash, broadJump: payload.broadJump, exitVelo: payload.exitVelo, throwingVelo: payload.throwingVelo });
                document.getElementById('t-weight').value = ''; document.getElementById('t-sixty').value = '';
                document.getElementById('t-broad').value = ''; document.getElementById('t-exit').value = ''; document.getElementById('t-throw').value = '';
                calculatePlayerPersonalRecords();
            }).catch(err => alert(err)).finally(() => btn.innerText = "Submit Testing Data");
        }

        function submitMaxesForm() {
            const btn = document.getElementById('btn-submit-maxes');
            btn.innerText = "Updating Records...";
            
            const payload = {
                type: "maxes", playerName: document.getElementById('global-player').value,
                benchPress: document.getElementById('m-bench').value || 0, hexDL: document.getElementById('m-hex').value || 0,
                squat: document.getElementById('m-squat').value || 0, frontSquat: document.getElementById('m-front').value || 0, hangClean: document.getElementById('m-clean').value || 0
            };

            fetch(googleAppUrl, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify(payload) })
            .then(() => {
                showToast();
                maxesLogs.push({ date: "Today", player: payload.playerName, benchPress: payload.benchPress, hexDL: payload.hexDL, squat: payload.squat, frontSquat: payload.frontSquat, hangClean: payload.hangClean });
                document.getElementById('m-bench').value = ''; document.getElementById('m-hex').value = '';
                document.getElementById('m-squat').value = ''; document.getElementById('m-front').value = ''; document.getElementById('m-clean').value = '';
                calculatePlayerPersonalRecords();
            }).catch(err => alert(err)).finally(() => btn.innerText = "Update Absolute Maxes");
        }

        function logCoreSet() {
            const btn = document.getElementById('btn-core'); const coreInput = document.getElementById('val-core');
            btn.innerText = "Saving...";
            const payload = {
                type: "workout", playerName: document.getElementById('global-player').value,
                block: 'Core Block', exercise: activeWorkout.Core_Exercise, weight: coreInput.value || 0, reps: 1
            };
            fetch(googleAppUrl, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify(payload) })
            .then(() => { showToast(); coreInput.value = ''; }).catch(err => alert(err)).finally(() => btn.innerText = "Log Core Finisher");
        }

        function showToast() { const t = document.getElementById('status'); t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 1500); }
        window.onload = () => { initListeners(); fetchDatabaseResources(); };
    </script>
</body>
</html>
